<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원정보</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="/css/layout.css">
</head>

<body class="min-h-screen bg-base-200 flex flex-col">

<!-- Header -->
<th:block th:replace="~{fragments/header :: header}"></th:block>

<!-- Main -->
<main class="flex-1 flex justify-center items-center px-4 py-10">

    <div class="card w-full max-w-2xl bg-base-100 shadow-xl">

        <div class="card-body">

            <h1 class="card-title text-3xl justify-center mb-6">
                👤 회원정보
            </h1>

            <div class="overflow-x-auto">
                <table class="table">

                    <tbody>

                    <tr>
                        <th class="w-40">아이디</th>
                        <td th:text="${loggedMember.userId}"></td>
                    </tr>

                    <tr>
                        <th>이름</th>
                        <td th:text="${loggedMember.userName}"></td>
                    </tr>

                    <tr>
                        <th>가입일</th>
                        <td th:text="${#temporals.format(loggedMember.regDate,'yyyy-MM-dd HH:mm')}"></td>
                    </tr>

                    <tr>
                        <th>권한</th>
                        <td>
                            <span class="badge badge-primary"
                                  th:text="${loggedMember.role}">
                            </span>
                        </td>
                    </tr>

                    </tbody>

                </table>
            </div>

            <div class="card-actions justify-end mt-6">
                <a href="/"
                   class="btn btn-outline">
                    홈
                </a>

                <form th:action="@{/member/logout}" method="post">
                    <button class="btn btn-error">
                        로그아웃
                    </button>
                </form>
            </div>

        </div>

    </div>

</main>

<!-- Footer -->
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
