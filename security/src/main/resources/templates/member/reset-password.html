<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-base-200 flex flex-col">

<!-- HEADER -->
<th:block th:replace="~{fragments/header :: header}"></th:block>

<!-- MAIN -->
<main class="flex-1 flex items-center justify-center px-4 py-12">

    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">

            <h1 class="text-3xl font-bold text-center mb-6">
                비밀번호 재설정
            </h1>

            <p class="text-sm text-center text-gray-500 mb-4">
                새 비밀번호를 입력하세요.
            </p>

            <form th:action="@{/member/reset-password}"
                  method="post"
                  id="resetPasswordForm"
                  class="space-y-4">

                <!-- 토큰이 있다면 hidden으로 전달 -->
                <input type="hidden" name="token" th:value="${token}">

                <div class="form-control">
                    <label class="label" for="newPassword">
                        <span class="label-text">새 비밀번호</span>
                    </label>
                    <input type="password"
                           id="newPassword"
                           name="newPassword"
                           placeholder="새 비밀번호를 입력하세요"
                           class="input input-bordered w-full">
                </div>

                <div class="form-control">
                    <label class="label" for="userPwCheck">
                        <span class="label-text">새 비밀번호 확인</span>
                    </label>
                    <input type="password"
                           id="userPwCheck"
                           name="userPwCheck"
                           placeholder="새 비밀번호를 다시 입력하세요"
                           class="input input-bordered w-full">
                </div>

                <p id="passwordMessage"
                   class="text-sm text-center font-semibold"></p>

                <button type="submit"
                        class="btn btn-primary w-full mt-4">
                    비밀번호 변경
                </button>

            </form>

            <div class="text-center mt-4">
                <a href="/member/login" class="link link-primary">
                    로그인으로 돌아가기
                </a>
            </div>

        </div>
    </div>

</main>

<!-- FOOTER -->
<th:block th:replace="~{fragments/footer :: footer}"></th:block>



</body>
</html>
