<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>회원가입</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="/css/layout.css">
</head>

<body class="min-h-screen bg-base-200 flex flex-col">

<!-- Header -->
<th:block th:replace="~{fragments/header :: header}"></th:block>

<!-- Main -->
<main class="flex-1 flex items-center justify-center px-4 py-12">

    <div class="card w-full max-w-lg bg-base-100 shadow-xl">
        <div class="card-body">

            <h1 class="text-3xl font-bold text-center mb-6">
                비밀번호 찾기
            </h1>

            <form th:action="@{/member/signup}"
                  method="post"
                  id="signupForm"
                  class="space-y-4">
                <!-- 이메일 -->
                <div class="form-control">
                    <label class="label" for="email">
                        <span class="label-text">이메일</span>
                    </label>

                    <div class="flex gap-2">
                        <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="이메일을 입력하세요"
                                class="input input-bordered w-full">

                        <button
                                type="button"
                                class="btn btn-secondary"
                                id="btn-auth"
                        >
                            인증번호 발송
                        </button>
                    </div>
                </div>

                <!-- 인증번호 -->
                <div class="form-control">
                    <label class="label" for="authCode">
                        <span class="label-text">인증번호</span>
                    </label>

                    <div class="flex gap-2">
                        <input
                                type="text"
                                id="authCode"
                                placeholder="인증번호를 입력하세요"
                                class="input input-bordered w-full">

                        <button
                                type="button"
                                class="btn btn-outline btn-primary"
                                id="btn-verified"
                        >
                            인증확인
                        </button>
                    </div>
                </div>

                <!-- 결과 메세지 -->
                <p id="authMessage"
                   class="text-sm text-center font-semibold"></p>

                <!-- 회원가입 -->
                <a href="/member/reset-password"
                   class="btn btn-primary w-full mt-4"
                   id="btn-reset-password"
                >
                    비밀번호 변경
                </a>

            </form>
        </div>
    </div>

</main>

<!-- Footer -->
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script>
    let emailVerified = false;
    const btnAuth =  document.querySelector("#btn-auth");
    const email =  document.querySelector("#email");
    const btnVerified = document.querySelector("#btn-verified");
    const authCode = document.querySelector("#authCode");
    const btnResetPassword = document.querySelector("#btn-reset-password");
    btnResetPassword.addEventListener("click",(e)=>{
        if(!emailVerified) {
            //이벤트 처리 막는 코드
            e.preventDefault();
            alert("이메일 인증을 해주세요");
        }
    })
    btnAuth.addEventListener("click",async (e)=>{
        console.log("btn-auth click");
        const emailValue= email.value;
        if(emailValue.trim()===""){
            alert("메일을 입력하세요.");
            return;
        }
        const response = await fetch("/member/find-password/send",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body:"email="+emailValue
        });
        const result = await response.text();
        //alert(result);
        const message = document.querySelector("#authMessage");
        message.innerText=result;
        message.className="text-sm text-center font-semibold text-success";
    })
    btnVerified.addEventListener("click",async (e)=>{
        const emailValue= email.value;
        const code = authCode.value
        const response = await fetch("/member/find-password/verify",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body:"email="+emailValue+"&code="+code
        });
        const result = await response.text(); //success or fail
        //alert(result);
        if(result==="인증 완료") {
            emailVerified = true;
        } else {
            emailVerified = false;
        }
        const message = document.querySelector("#authMessage");
        message.innerText=result;
        message.className="text-sm text-center font-semibold text-success";
    })
</script>

</body>
</html>
