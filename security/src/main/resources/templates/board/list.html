<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판 목록</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-base-200 flex flex-col">

<!-- HEADER -->
<th:block th:replace="~{fragments/header :: header}"></th:block>

<!-- MAIN -->
<main class="flex-1 max-w-6xl w-full mx-auto px-4 py-10">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">게시판</h1>

        <a href="/board/write" th:href="@{/board/write}" class="btn btn-primary">
            글쓰기
        </a>
    </div>

    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">

            <div class="overflow-x-auto">
                <table class="table table-zebra w-full">
                    <thead>
                    <tr>
                        <th class="w-20">번호</th>
                        <th>제목</th>
                        <th class="w-40">작성자</th>
                        <th class="w-24">조회수</th>
                        <th class="w-48">작성일</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="board : ${boardList}">
                        <td th:text="${board.no}">1</td>

                        <td>
                            <a class="link link-hover font-semibold"
                               th:href="@{/board/view(no=${board.no})}"
                               th:text="${board.title}">
                                제목입니다
                            </a>
                        </td>

                        <td th:text="${board.author}">작성자</td>

                        <td th:text="${board.hit}">0</td>

                        <td th:text="${#temporals.format(board.regDate, 'yyyy-MM-dd HH:mm')}">
                            2026-06-25 10:00
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(boardList)}">
                        <td colspan="5" class="text-center py-10 text-gray-400">
                            등록된 게시글이 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</main>

<!-- FOOTER -->
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
