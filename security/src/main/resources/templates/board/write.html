<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-base-200 flex flex-col">

<!-- Header -->
<th:block th:replace="~{fragments/header :: header}"></th:block>

<!-- Main -->
<main class="flex-1 flex justify-center items-center px-4 py-10">

    <div class="card w-full max-w-3xl bg-base-100 shadow-xl">
        <div class="card-body">

            <h1 class="text-3xl font-bold text-center mb-8">
                게시글 작성
            </h1>

            <form action="/board/write"
                  method="post"
                  class="space-y-6">

                <!-- 제목 -->
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-semibold">제목</span>
                    </label>
                    <input
                            type="text"
                            name="title"
                            class="input input-bordered w-full"
                            placeholder="제목을 입력하세요"
                            required>
                </div>

                <!-- 내용 -->
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-semibold">내용</span>
                    </label>
                    <textarea
                            name="content"
                            class="textarea textarea-bordered w-full h-72"
                            placeholder="내용을 입력하세요"
                            required></textarea>
                </div>

                <!-- 버튼 -->
                <div class="flex justify-end gap-2 pt-4">
                    <a href="/board/list" class="btn btn-outline">
                        목록
                    </a>

                    <button type="submit" class="btn btn-primary">
                        등록
                    </button>
                </div>

            </form>

        </div>
    </div>

</main>

<!-- Footer -->
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
