<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<h1>MEMBER</h1>
<!-- 1.토큰이용  jwt  리액트-->

    <a href="/member/info" th:text="${session.loggedMemberDto.userId}">장성호</a>

</div>
