<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>영화예매</title>

    <!-- DaisyUI + Tailwind CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 min-h-screen">

<div class="max-w-3xl mx-auto p-6">
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">

            <h1 class="card-title text-3xl mb-6">🎬 영화예매</h1>

            <ul class="space-y-3">
                <li th:each="item:${movieList}"
                    class="flex items-center justify-between gap-3 p-4 border rounded-lg bg-base-100">

                    <div class="flex items-center gap-4">
                        <span class="badge badge-neutral" th:text="${item.no}">1</span>

                        <span class="font-bold text-lg" th:text="${item.title}">
                            범죄도시
                        </span>

                        <span class="badge"
                              th:classappend="${item.reserveYn == 'Y'} ? ' badge-success' : ' badge-warning'"
                              th:text="${item.reserveYn}">
                            N
                        </span>
                    </div>

                    <div class="flex gap-2">
                        <form action="/movie/reserve" method="post">
                            <input type="hidden" name="no" th:value="${item.no}">
                            <button class="btn btn-sm btn-primary">
                                예매완료
                            </button>
                        </form>

                        <form action="/movie/delete" method="post">
                            <input type="hidden" name="no" th:value="${item.no}">
                            <button class="btn btn-sm btn-error">
                                삭제
                            </button>
                        </form>
                    </div>
                </li>
            </ul>

            <div class="divider"></div>

            <form action="/movie/write" method="post" class="flex gap-2">
                <input type="text"
                       name="title"
                       placeholder="영화제목을 입력하세요."
                       class="input input-bordered flex-1">

                <button class="btn btn-success">
                    영화 등록
                </button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
