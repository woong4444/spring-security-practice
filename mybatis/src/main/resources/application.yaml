spring:
  application:
    name: mybatis
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true
  thymeleaf:
    cache: false
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: spring
    password: 1234
mybatis:
  mapper-locations: classpath:/mybatis/mapper/**/*.xml
  type-aliases-package: com.jjang051.mybatis.member.dto,com.jjang051.mybatis.board.dto
  configuration:
    map-underscore-to-camel-case: true
    #테이블의 컬럼명이 _ 인 경우 dto로 매핑할때 _를 지우고 대문자로 바꿔라
